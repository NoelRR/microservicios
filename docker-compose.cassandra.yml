# Cluster Cassandra distribuido: 1 nodo por maquina (A, B, C).
#
# network_mode: host = el contenedor usa la IP real del host (sin NAT de Docker).
# Necesario para que el gossip entre maquinas distintas funcione.
#
# Variables de entorno requeridas antes de levantar:
#   HOST_IP  = IP real de ESTA maquina
#   SEED_IP  = IP de la maquina A (siempre el seed del cluster)
#
# Levantar en cada maquina:
#   PC-A:  HOST_IP=192.168.X.A SEED_IP=192.168.X.A docker compose -f docker-compose.cassandra.yml up -d
#   PC-B:  HOST_IP=192.168.X.B SEED_IP=192.168.X.A docker compose -f docker-compose.cassandra.yml up -d
#   PC-C:  HOST_IP=192.168.X.C SEED_IP=192.168.X.A docker compose -f docker-compose.cassandra.yml up -d
#
# Verificar que los 3 nodos estan UN (desde cualquier maquina):
#   docker exec -it toby-cassandra nodetool status
#
# Crear esquema UNA vez desde PC-A (cuando los 3 esten UN):
#   docker exec -i toby-cassandra cqlsh -f /init-cassandra.cql
#
# Demostrar replicacion (una fila en 3 IPs distintas):
#   docker exec -it toby-cassandra nodetool getendpoints reportks ventas <pedidoId>
#
# Puertos que deben estar abiertos en el firewall entre maquinas:
#   7000 (gossip inter-nodo), 9042 (CQL clientes)

services:
  cassandra:
    image: cassandra:5
    container_name: toby-cassandra
    # host network: el nodo escucha en la IP real de la maquina, no en una IP Docker interna.
    # Sin esto, los otros nodos no pueden alcanzar este contenedor por la LAN.
    network_mode: host
    environment:
      CASSANDRA_CLUSTER_NAME: "toby-cluster"
      # Seed = punto de encuentro del cluster. Todos apuntan a PC-A.
      CASSANDRA_SEEDS: "${SEED_IP}"
      # IP real de esta maquina: gossip e inter-node la usan para comunicarse.
      CASSANDRA_LISTEN_ADDRESS: "${HOST_IP}"
      # 0.0.0.0: acepta conexiones CQL desde cualquier interfaz.
      CASSANDRA_RPC_ADDRESS: "0.0.0.0"
      # IP que el driver del cliente ve al hacer gossip discovery.
      CASSANDRA_BROADCAST_RPC_ADDRESS: "${HOST_IP}"
      CASSANDRA_DC: "datacenter1"
      CASSANDRA_ENDPOINT_SNITCH: "GossipingPropertyFileSnitch"
      MAX_HEAP_SIZE: "512M"
      HEAP_NEWSIZE: "128M"
    volumes:
      - cassandra-data:/var/lib/cassandra
      - ./infra/init-cassandra.cql:/init-cassandra.cql:ro
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q '^UN'"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 60s

volumes:
  cassandra-data:
