<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <style>
      .title  { font-size: 24px; font-weight: 700; fill: #1b3a5b; }
      .subtitle{ font-size: 14px; fill: #5a6b7b; }
      .lbl    { font-size: 13px; font-weight: 600; }
      .small  { font-size: 11px; fill: #44525f; }
      .tiny   { font-size: 10px; fill: #5a6b7b; }
      .port   { font-size: 10px; font-weight: 700; fill: #b25b00; }
      .edge   { stroke: #7a8b99; stroke-width: 2; fill: none; }
      .edgeEv { stroke: #c0392b; stroke-width: 2; stroke-dasharray: 6 4; fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7a8b99"/>
    </marker>
    <marker id="arrowEv" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c0392b"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1180" height="720" fill="#f4f7fa"/>

  <!-- Header -->
  <text x="40" y="44" class="title">Hamburguesas Toby — Arquitectura de microservicios</text>
  <text x="40" y="66" class="subtitle">Spring Boot 3.3.5 · Spring Cloud 2023.0.3 · Java 21 · RabbitMQ · React + Vite</text>

  <!-- ===================== CLIENTE ===================== -->
  <g>
    <rect x="40" y="120" width="180" height="180" rx="10" fill="#ffffff" stroke="#3498db" stroke-width="2"/>
    <text x="130" y="148" text-anchor="middle" class="lbl" fill="#1b3a5b">Cliente</text>
    <rect x="62" y="166" width="136" height="110" rx="8" fill="#eaf4fc" stroke="#3498db"/>
    <text x="130" y="200" text-anchor="middle" class="lbl" fill="#1565c0">Frontend SPA</text>
    <text x="130" y="222" text-anchor="middle" class="small">React 18 + Vite 5</text>
    <text x="130" y="240" text-anchor="middle" class="small">react-router-dom</text>
    <text x="130" y="262" text-anchor="middle" class="port">:5173  (proxy /api)</text>
  </g>

  <!-- ===================== API GATEWAY ===================== -->
  <g>
    <rect x="290" y="140" width="140" height="140" rx="10" fill="#ffffff" stroke="#16a085" stroke-width="2"/>
    <text x="360" y="178" text-anchor="middle" class="lbl" fill="#0e6b57">API Gateway</text>
    <text x="360" y="200" text-anchor="middle" class="small">Spring Cloud</text>
    <text x="360" y="216" text-anchor="middle" class="small">Gateway</text>
    <text x="360" y="240" text-anchor="middle" class="tiny">enrutado por</text>
    <text x="360" y="254" text-anchor="middle" class="tiny">descubrimiento</text>
    <text x="360" y="274" text-anchor="middle" class="port">:8080</text>
  </g>

  <!-- cliente -> gateway -->
  <path class="edge" d="M220,210 L288,210" marker-end="url(#arrow)"/>
  <text x="254" y="202" text-anchor="middle" class="tiny">HTTP/REST</text>

  <!-- ===================== MICROSERVICIOS ===================== -->
  <!-- contenedor visual -->
  <rect x="480" y="100" width="420" height="430" rx="12" fill="#eef2f6" stroke="#c3cfdb" stroke-dasharray="5 4"/>
  <text x="690" y="124" text-anchor="middle" class="subtitle" font-weight="700">Microservicios (Spring Boot 3.3.5 · Java 21)</text>

  <!-- menu-service -->
  <g>
    <rect x="500" y="140" width="380" height="100" rx="9" fill="#ffffff" stroke="#8e44ad" stroke-width="2"/>
    <text x="516" y="166" class="lbl" fill="#6c3483">menu-service</text>
    <text x="516" y="186" class="small">CRUD platos / combos · Spring Web + JPA</text>
    <text x="516" y="204" class="small">GET /menu/items (público)</text>
    <text x="516" y="224" class="port">:8082</text>
    <!-- db -->
    <g transform="translate(792,150)">
      <ellipse cx="34" cy="10" rx="34" ry="9" fill="#dfeaf5" stroke="#2e6da4"/>
      <path d="M0,10 V58 a34,9 0 0 0 68,0 V10" fill="#dfeaf5" stroke="#2e6da4"/>
      <ellipse cx="34" cy="10" rx="34" ry="9" fill="#eaf2fb" stroke="#2e6da4"/>
      <text x="34" y="38" text-anchor="middle" class="tiny" font-weight="700" fill="#1f4e79">Postgres</text>
      <text x="34" y="52" text-anchor="middle" class="tiny" fill="#1f4e79">menudb</text>
    </g>
  </g>

  <!-- order-service -->
  <g>
    <rect x="500" y="260" width="380" height="100" rx="9" fill="#ffffff" stroke="#e67e22" stroke-width="2"/>
    <text x="516" y="286" class="lbl" fill="#b9650f">order-service</text>
    <text x="516" y="306" class="small">Crea pedidos · valida vs menu (lb://)</text>
    <text x="516" y="324" class="small">publica order.created</text>
    <text x="516" y="344" class="port">:8083</text>
    <g transform="translate(792,270)">
      <ellipse cx="34" cy="10" rx="34" ry="9" fill="#dfeaf5" stroke="#2e6da4"/>
      <path d="M0,10 V58 a34,9 0 0 0 68,0 V10" fill="#dfeaf5" stroke="#2e6da4"/>
      <ellipse cx="34" cy="10" rx="34" ry="9" fill="#eaf2fb" stroke="#2e6da4"/>
      <text x="34" y="38" text-anchor="middle" class="tiny" font-weight="700" fill="#1f4e79">Postgres</text>
      <text x="34" y="52" text-anchor="middle" class="tiny" fill="#1f4e79">orderdb</text>
    </g>
  </g>

  <!-- report-service -->
  <g>
    <rect x="500" y="380" width="380" height="130" rx="9" fill="#ffffff" stroke="#c0392b" stroke-width="2"/>
    <text x="516" y="406" class="lbl" fill="#922b21">report-service</text>
    <text x="516" y="426" class="small">consume order.created · agrega ventas</text>
    <text x="516" y="444" class="small">/reportes/ventas · platos-mas-vendidos</text>
    <text x="516" y="464" class="port">:8087</text>
    <g transform="translate(792,392)">
      <ellipse cx="34" cy="10" rx="34" ry="9" fill="#fde9e7" stroke="#c0392b"/>
      <path d="M0,10 V72 a34,9 0 0 0 68,0 V10" fill="#fde9e7" stroke="#c0392b"/>
      <ellipse cx="34" cy="10" rx="34" ry="9" fill="#fdf1f0" stroke="#c0392b"/>
      <text x="34" y="36" text-anchor="middle" class="tiny" font-weight="700" fill="#922b21">Cassandra</text>
      <text x="34" y="50" text-anchor="middle" class="tiny" fill="#922b21">reportks</text>
      <text x="34" y="64" text-anchor="middle" class="tiny" fill="#922b21">cluster distribuido</text>
    </g>
  </g>

  <!-- gateway -> servicios -->
  <path class="edge" d="M430,200 C460,200 470,190 498,190" marker-end="url(#arrow)"/>
  <path class="edge" d="M430,210 C460,260 470,310 498,310" marker-end="url(#arrow)"/>
  <path class="edge" d="M430,220 C460,360 470,430 498,430" marker-end="url(#arrow)"/>

  <!-- order -> menu (REST validación) -->
  <path class="edge" d="M560,260 C548,250 548,250 560,240" marker-end="url(#arrow)"/>
  <text x="500" y="252" class="tiny" fill="#7a8b99">valida REST</text>

  <!-- ===================== INFRA BUS ===================== -->
  <!-- RabbitMQ -->
  <g>
    <rect x="960" y="240" width="180" height="120" rx="10" fill="#fff3e0" stroke="#e67e22" stroke-width="2"/>
    <text x="1050" y="268" text-anchor="middle" class="lbl" fill="#b9650f">RabbitMQ</text>
    <text x="1050" y="290" text-anchor="middle" class="small">orders.exchange (topic)</text>
    <text x="1050" y="308" text-anchor="middle" class="small">routing: order.created</text>
    <text x="1050" y="330" text-anchor="middle" class="tiny">AMQP :5672 · UI :15672</text>
    <text x="1050" y="348" text-anchor="middle" class="tiny">mensajería asíncrona</text>
  </g>

  <!-- order publica -> rabbit -->
  <path class="edgeEv" d="M880,300 L958,300" marker-end="url(#arrowEv)"/>
  <text x="918" y="292" text-anchor="middle" class="tiny" fill="#c0392b">publish</text>
  <!-- rabbit -> report consume (rodea el cluster por la izquierda) -->
  <path class="edgeEv" d="M965,360 C912,378 908,470 882,478" marker-end="url(#arrowEv)"/>
  <text x="912" y="408" text-anchor="middle" class="tiny" fill="#c0392b">consume</text>
  <text x="912" y="420" text-anchor="middle" class="tiny" fill="#c0392b">order.created</text>

  <!-- ===================== CLUSTER CASSANDRA DISTRIBUIDO ===================== -->
  <g>
    <rect x="940" y="392" width="200" height="160" rx="10" fill="#fdf1f0" stroke="#c0392b" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="1040" y="412" text-anchor="middle" class="lbl" fill="#922b21">Cluster Cassandra</text>
    <text x="1040" y="427" text-anchor="middle" class="tiny" fill="#922b21">1 nodo por PC · RF=3</text>
    <text x="1040" y="440" text-anchor="middle" class="tiny" fill="#922b21">network_mode: host · gossip LAN</text>

    <!-- gossip ring (triangulo entre los 3 nodos) -->
    <path d="M1040,470 L987,524 M1040,470 L1093,524 M987,524 L1093,524"
          stroke="#c0392b" stroke-width="1.5" stroke-dasharray="3 3" fill="none"/>

    <!-- PC-A (seed) -->
    <g transform="translate(1012,453)">
      <rect x="0" y="0" width="56" height="34" rx="6" fill="#ffffff" stroke="#c0392b"/>
      <text x="28" y="15" text-anchor="middle" class="tiny" font-weight="700" fill="#922b21">PC-A</text>
      <text x="28" y="28" text-anchor="middle" class="tiny" fill="#922b21">nodo · seed</text>
    </g>
    <!-- PC-B -->
    <g transform="translate(959,507)">
      <rect x="0" y="0" width="56" height="34" rx="6" fill="#ffffff" stroke="#c0392b"/>
      <text x="28" y="15" text-anchor="middle" class="tiny" font-weight="700" fill="#922b21">PC-B</text>
      <text x="28" y="28" text-anchor="middle" class="tiny" fill="#922b21">nodo</text>
    </g>
    <!-- PC-C -->
    <g transform="translate(1065,507)">
      <rect x="0" y="0" width="56" height="34" rx="6" fill="#ffffff" stroke="#c0392b"/>
      <text x="28" y="15" text-anchor="middle" class="tiny" font-weight="700" fill="#922b21">PC-C</text>
      <text x="28" y="28" text-anchor="middle" class="tiny" fill="#922b21">nodo</text>
    </g>
  </g>

  <!-- report DB -> cluster distribuido -->
  <path class="edge" stroke="#c0392b" d="M882,440 C905,452 915,460 938,465" marker-end="url(#arrow)"/>
  <text x="906" y="458" text-anchor="middle" class="tiny" fill="#922b21">CQL :9042</text>

  <!-- ===================== EUREKA ===================== -->
  <g>
    <rect x="290" y="360" width="140" height="90" rx="10" fill="#e8f8f1" stroke="#16a085" stroke-width="2"/>
    <text x="360" y="388" text-anchor="middle" class="lbl" fill="#0e6b57">Eureka Server</text>
    <text x="360" y="408" text-anchor="middle" class="small">Service Discovery</text>
    <text x="360" y="424" text-anchor="middle" class="small">Spring Cloud Netflix</text>
    <text x="360" y="442" text-anchor="middle" class="port">:8761</text>
  </g>
  <!-- registro discovery (punteado gris) -->
  <path class="edge" stroke-dasharray="4 4" d="M360,360 L360,282" marker-end="url(#arrow)"/>
  <path class="edge" stroke-dasharray="4 4" d="M430,405 C470,405 480,300 498,300" marker-end="url(#arrow)"/>
  <text x="300" y="330" class="tiny">se registran</text>

  <!-- ===================== INFRA FOOTER ===================== -->
  <rect x="40" y="560" width="1100" height="120" rx="12" fill="#ffffff" stroke="#c3cfdb"/>
  <text x="60" y="588" class="subtitle" font-weight="700" fill="#1b3a5b">Infraestructura / DevOps</text>

  <g transform="translate(60,600)">
    <rect x="0" y="0" width="200" height="60" rx="8" fill="#eaf4fc" stroke="#3498db"/>
    <text x="100" y="26" text-anchor="middle" class="lbl" fill="#1565c0">Docker Compose</text>
    <text x="100" y="46" text-anchor="middle" class="small">infra base + cluster Cassandra</text>
  </g>
  <g transform="translate(280,600)">
    <rect x="0" y="0" width="200" height="60" rx="8" fill="#eaf2fb" stroke="#2e6da4"/>
    <text x="100" y="26" text-anchor="middle" class="lbl" fill="#1f4e79">PostgreSQL 16</text>
    <text x="100" y="46" text-anchor="middle" class="small">menudb · orderdb  (:5433)</text>
  </g>
  <g transform="translate(500,600)">
    <rect x="0" y="0" width="200" height="60" rx="8" fill="#fdf1f0" stroke="#c0392b"/>
    <text x="100" y="26" text-anchor="middle" class="lbl" fill="#922b21">Cassandra 5</text>
    <text x="100" y="46" text-anchor="middle" class="small">1 nodo/PC × 3 PCs · RF=3</text>
  </g>
  <g transform="translate(720,600)">
    <rect x="0" y="0" width="200" height="60" rx="8" fill="#fff3e0" stroke="#e67e22"/>
    <text x="100" y="26" text-anchor="middle" class="lbl" fill="#b9650f">RabbitMQ 3</text>
    <text x="100" y="46" text-anchor="middle" class="small">broker AMQP (management)</text>
  </g>
  <g transform="translate(940,600)">
    <rect x="0" y="0" width="180" height="60" rx="8" fill="#e8f8f1" stroke="#16a085"/>
    <text x="90" y="26" text-anchor="middle" class="lbl" fill="#0e6b57">Maven · Java 21</text>
    <text x="90" y="46" text-anchor="middle" class="small">build multi-módulo</text>
  </g>

  <!-- Leyenda -->
  <g transform="translate(40,690)">
    <line x1="0" y1="0" x2="30" y2="0" class="edge" marker-end="url(#arrow)"/>
    <text x="38" y="4" class="tiny">HTTP/REST síncrono</text>
    <line x1="190" y1="0" x2="220" y2="0" class="edgeEv" marker-end="url(#arrowEv)"/>
    <text x="228" y="4" class="tiny">evento asíncrono (RabbitMQ)</text>
    <line x1="430" y1="0" x2="460" y2="0" class="edge" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
    <text x="468" y="4" class="tiny">registro en Eureka (discovery)</text>
  </g>
</svg>
